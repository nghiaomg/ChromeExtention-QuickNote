<!DOCTYPE html>
<html lang="en" class="h-full">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuickNote</title>
    <script src="lib/tailwindcss.js"></script>
    <link rel="stylesheet" href="lib/preline.min.css">
    <link rel="stylesheet" href="styles.css">
</head>

<body class="bg-gray-50 dark:bg-[#0a0a0a] flex flex-col h-full w-[380px] min-h-[480px]">

    <!-- Top Bar -->
    <div class="flex items-center justify-between px-3 py-2 border-b border-gray-200 dark:border-neutral-800">
        <span class="text-base font-semibold text-blue-600 dark:text-blue-500">QuickNote</span>
        <div class="flex items-center gap-1">
            <!-- Theme Toggle -->
            <button id="theme-toggle" type="button"
                class="p-1.5 rounded-md text-gray-500 hover:bg-gray-100 dark:text-neutral-400 dark:hover:bg-neutral-800 transition-colors"
                title="Chuyển chế độ sáng/tối">
                <svg class="sun-icon shrink-0 size-4 hidden dark:block" xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                    viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round">
                    <circle cx="12" cy="12" r="4"/>
                    <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/>
                </svg>
                <svg class="moon-icon shrink-0 size-4 block dark:hidden" xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                    viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round">
                    <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/>
                </svg>
            </button>
            <!-- Fullscreen -->
            <button id="open-fullscreen" type="button"
                class="p-1.5 rounded-md text-gray-500 hover:bg-gray-100 dark:text-neutral-400 dark:hover:bg-neutral-800 transition-colors"
                title="Mở toàn màn hình">
                <svg class="shrink-0 size-4" xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                    viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round">
                    <path d="M8 3H5a2 2 0 0 0-2 2v3" />
                    <path d="M21 8V5a2 2 0 0 0-2-2h-3" />
                    <path d="M3 16v3a2 2 0 0 0 2 2h3" />
                    <path d="M16 21h3a2 2 0 0 0 2-2v-3" />
                </svg>
            </button>
        </div>
    </div>

    <!-- Content -->
    <main class="flex-grow flex flex-col overflow-hidden">

        <!-- Folders + Actions compact row -->
        <div class="flex items-center gap-2 px-3 pt-3 pb-2">
            <div class="flex-1 flex overflow-x-auto folders-scroll gap-1.5" id="folders-container">
                <button type="button"
                    class="folder-tab shrink-0 px-3 py-1 text-xs font-medium rounded-full border border-blue-600 bg-blue-600 text-white hover:bg-blue-700 transition-colors whitespace-nowrap"
                    data-id="all">Tất cả</button>
            </div>
            <!-- Add Folder -->
            <button id="add-folder-btn" type="button"
                class="shrink-0 p-1 rounded text-gray-400 hover:text-blue-500 hover:bg-blue-50 dark:hover:bg-neutral-800 transition-colors"
                title="Thêm thư mục">
                <svg class="size-4" xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                    viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round">
                    <path d="M5 12h14" /><path d="M12 5v14" />
                </svg>
            </button>
            <!-- Search Toggle -->
            <button id="search-toggle" type="button"
                class="shrink-0 p-1 rounded text-gray-400 hover:text-gray-600 dark:hover:text-neutral-300 transition-colors"
                title="Tìm kiếm">
                <svg class="size-4" xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                    viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8" /><path d="m21 21-4.3-4.3" />
                </svg>
            </button>
        </div>

        <!-- Search Bar (hidden by default, toggled) -->
        <div id="search-bar" class="hidden px-3 pb-2">
            <input type="text" id="search-input"
                class="w-full py-2 px-3 text-sm border border-gray-200 dark:border-neutral-700 rounded-lg bg-white dark:bg-neutral-900 text-gray-800 dark:text-neutral-200 placeholder-neutral-400 focus:outline-none focus:ring-1 focus:ring-blue-500"
                placeholder="Tìm kiếm...">
        </div>

        <!-- Add Note -->
        <div class="px-3 pb-2">
            <input type="text" id="note-input"
                class="w-full py-2.5 px-3 text-sm border border-gray-200 dark:border-neutral-700 rounded-lg bg-white dark:bg-neutral-900 text-gray-800 dark:text-neutral-200 placeholder-neutral-400 focus:outline-none focus:ring-1 focus:ring-blue-500"
                placeholder="Thêm ghi chú — Enter để lưu">
        </div>

        <!-- Divider -->
        <div class="px-3 pb-2">
            <div class="border-t border-gray-100 dark:border-neutral-800"></div>
        </div>

        <!-- Notes -->
        <div id="notes-container" class="flex-1 overflow-y-auto px-3 pb-3 space-y-2">
            <!-- Rendered here -->
        </div>
    </main>

    <script src="lib/sortable.min.js"></script>
    <script src="lib/preline.min.js"></script>
    <script src="popup.js"></script>
</body>

</html>
